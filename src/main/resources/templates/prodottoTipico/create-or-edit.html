<!doctype html>
<html lang="it" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block
      th:replace="~{fragments/headScript :: head(${edit} ? 'Modifica Prodotto Tipico' :  'Nuovo Prodotto Tipico')}"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <!-- Navigazione Superiore e Annullamento -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <a
          th:href="@{/backoffice/prodotti/all}"
          class="btn btn-outline-secondary btn-sm px-4 fw-semibold shadow-sm"
        >
          Annulla e Torna all'Elenco
        </a>
      </div>

      <!-- Intestazione Pagina Dinamica -->
      <header class="mb-4">
        <h1
          class="h2 fw-bold text-primary mb-0"
          th:text="${edit} ? 'Modifica Prodotto Tipico' : 'Nuovo Prodotto Tipico'"
        >
          Titolo pagina se create o edit
        </h1>
      </header>

      <form
        th:action="${edit} ? @{|/backoffice/prodotti/${nuovoProdottoTipico.slug}/edit|} : @{/backoffice/prodotti/create}"
        th:object="${nuovoProdottoTipico}"
        method="POST"
        class="row g-4"
      >
        <!-- <input type="hidden" th:field="*{slug}" /> -->

        <div class="col-12 col-lg-7">
          <main class="card shadow-sm p-4 bg-white rounded-3 mb-0">
            <h2 class="h5 fw-bold text-dark border-bottom pb-2 mb-3">
              Informazioni Principali
            </h2>

            <div class="mb-3">
              <label for="nome" class="form-label text-muted small fw-bold"
                >Nome Prodotto</label
              >
              <input
                type="text"
                id="nome"
                th:field="*{nome}"
                class="form-control"
                placeholder="Inserire nome del prodotto ..."
                required
              />
            </div>

            <div class="row">
              <div class="col-12 col-md-6 mb-3">
                <label for="regione" class="form-label text-muted small fw-bold"
                  >Regione</label
                >
                <select
                  id="regione"
                  th:field="*{regione.slug}"
                  class="form-select"
                  required
                >
                  <option value="" hidden>Seleziona una regione...</option>
                  <option
                    th:each="regioneSelezione : ${listaRegioni}"
                    th:value="${regioneSelezione.slug}"
                  >
                    [[${regioneSelezione.nome}]]
                  </option>
                </select>
              </div>

              <!-- Select Categoria tramite SLUG -->
              <div class="col-12 col-md-6 mb-3">
                <label
                  for="categoria"
                  class="form-label text-muted small fw-bold"
                  >Categoria</label
                >
                <select
                  id="categoria"
                  th:field="*{categoria.slug}"
                  class="form-select"
                  required
                >
                  <option value="" hidden>Seleziona una categoria...</option>
                  <option
                    th:each="categoriaSelezione : ${listaCategorie}"
                    th:value="${categoriaSelezione.slug}"
                  >
                    [[${categoriaSelezione.nome}]]
                  </option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="linkStore" class="form-label text-muted small fw-bold"
                >URL Link Store (Acquisto)</label
              >
              <input
                type="url"
                id="linkStore"
                th:field="*{linkStore}"
                class="form-control font-monospace text-primary small"
                placeholder="https://example.com"
              />
            </div>

            <div class="mb-0">
              <label
                for="urlImmagine"
                class="form-label text-muted small fw-bold"
                >URL Immagine di Copertina</label
              >
              <input
                type="text"
                id="urlImmagine"
                th:field="*{urlImmagine}"
                class="form-control font-monospace small text-muted"
                placeholder="https://example.com"
                required
              />
            </div>
          </main>
        </div>

        <div class="col-12 col-lg-5">
          <div
            class="card shadow-sm p-4 bg-white rounded-3 h-100 d-flex flex-column justify-content-between"
          >
            <div>
              <h2 class="h5 fw-bold text-dark border-bottom pb-2 mb-3">
                Descrizione Completa
              </h2>
              <div class="mb-0">
                <textarea
                  id="descrizione"
                  th:field="*{descrizione}"
                  rows="6"
                  class="form-control text-muted small lh-base"
                  placeholder="Inserisci la descrizione del prodotto tipico ..."
                  required
                ></textarea>
              </div>
            </div>

            <div class="mt-4 pt-3 border-top">
              <button
                type="submit"
                class="btn btn-primary btn-lg w-100 py-2.5 shadow-sm fw-bold"
              >
                Salva Scheda Prodotto
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <th:block th:replace="~{fragments/headScript :: script}" />
  </body>
</html>
